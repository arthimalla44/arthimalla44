name: Update Profile Stats

on:
  schedule:
    - cron: "0 * * * *" # Every hour
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/update-profile.yml"
      - ".github/scripts/**"

permissions:
  contents: write

concurrency:
  group: update-profile-stats
  cancel-in-progress: true

jobs:
  update-readme:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: pip install requests

      - name: Run Deployments Count Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 .github/scripts/update_deployments.py

      - name: Fetch and Update Activity
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const username = 'arthimalla44';
            const { data: events } = await github.rest.activity.listPublicEventsForUser({
              username: username,
              per_page: 30
            });
            
            let activity = [];
            for (const ev of events) {
              if (activity.length >= 5) break;
              let repo = ev.repo.name;
              let url = `https://github.com/${repo}`;
              
              let dateStr = new Date(ev.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
              
              if (ev.type === 'PushEvent') {
                let commits = ev.payload.size || (ev.payload.commits ? ev.payload.commits.length : 1);
                let branch = ev.payload.ref ? ev.payload.ref.replace('refs/heads/', '') : 'main';
                let commitMsg = ev.payload.commits && ev.payload.commits.length > 0 ? (ev.payload.commits[0].message || 'Updates pushed').split('\n')[0] : 'Updates pushed';
                activity.push(`- 🚀 Pushed ${commits} commit(s) to \`${branch}\` in **[${repo}](${url})** — _${commitMsg}_ \`(${dateStr})\``);
              } else if (ev.type === 'IssuesEvent') {
                let action = ev.payload.action;
                let issueNum = ev.payload.issue.number;
                let issueUrl = ev.payload.issue.html_url || `https://github.com/${repo}/issues/${issueNum}`;
                let title = ev.payload.issue.title || `Issue #${issueNum}`;
                let emoji = action === 'opened' ? '❗' : (action === 'closed' ? '🔒' : '🗣️');
                activity.push(`- ${emoji} ${action.charAt(0).toUpperCase() + action.slice(1)} Issue [#${issueNum}](${issueUrl}) in **[${repo}](${url})** — _${title}_ \`(${dateStr})\``);
              } else if (ev.type === 'PullRequestEvent') {
                let action = ev.payload.action;
                let prNum = ev.payload.number || ev.payload.pull_request.number;
                let prUrl = ev.payload.pull_request.html_url || `https://github.com/${repo}/pull/${prNum}`;
                let title = ev.payload.pull_request.title || `Pull Request #${prNum}`;
                activity.push(`- 🔄 ${action.charAt(0).toUpperCase() + action.slice(1)} PR [#${prNum}](${prUrl}) in **[${repo}](${url})** — _${title}_ \`(${dateStr})\``);
              } else if (ev.type === 'CreateEvent') {
                let refType = ev.payload.ref_type;
                activity.push(`- 🎉 Created ${refType} in **[${repo}](${url})** \`(${dateStr})\``);
              } else if (ev.type === 'WatchEvent') {
                activity.push(`- ⭐ Starred **[${repo}](${url})** \`(${dateStr})\``);
              } else if (ev.type === 'ForkEvent') {
                activity.push(`- 🍴 Forked **[${repo}](${url})** \`(${dateStr})\``);
              } else {
                continue;
              }
            }
            
            if (activity.length === 0) activity.push("No recent activity found.");
            
            let contributionsContent = 'No external contributions found.';
            try {
              const { data: prData } = await github.rest.search.issuesAndPullRequests({
                 q: 'type:pr author:arthimalla44 -user:arthimalla44'
              });
              
              if (prData && prData.items && prData.items.length > 0) {
                const repos = {};
                for (const item of prData.items) {
                  const repoUrl = item.repository_url;
                  const repoName = repoUrl.replace('https://api.github.com/repos/', '');
                  if (!repos[repoName]) {
                    repos[repoName] = {
                      stars: 0,
                      description: '',
                      prs: []
                    };
                  }
                  repos[repoName].prs.push({
                    number: item.number,
                    title: item.title,
                    url: item.html_url
                  });
                }
                
                for (const repoName of Object.keys(repos)) {
                  try {
                    const [owner, repo] = repoName.split('/');
                    const { data: repoDetails } = await github.rest.repos.get({
                      owner,
                      repo
                    });
                    repos[repoName].stars = repoDetails.stargazers_count;
                    repos[repoName].description = repoDetails.description || '';
                  } catch (err) {
                    console.log(`Failed to fetch repo details for ${repoName}: ${err.message}`);
                  }
                }
                
                let contributionsMarkdown = [];
                for (const [repoName, info] of Object.entries(repos)) {
                  const starCount = info.stars >= 1000 ? `${(info.stars / 1000).toFixed(0)}k+` : info.stars;
                  let md = `> ### 📦 **[${repoName}](https://github.com/${repoName})** *(${starCount} ⭐)*\n`;
                  if (info.description) {
                    md += `> _${info.description}_\n> \n`;
                  }
                  for (const pr of info.prs) {
                    let emoji = '🔧';
                    if (pr.title.toLowerCase().includes('fix')) emoji = '🔧';
                    else if (pr.title.toLowerCase().includes('feat') || pr.title.toLowerCase().includes('add')) emoji = '✨';
                    else if (pr.title.toLowerCase().includes('doc') || pr.title.toLowerCase().includes('readme')) emoji = '📝';
                    
                    md += `> *   ${emoji} **[PR #${pr.number}](${pr.url})** — ${pr.title}\n`;
                  }
                  contributionsMarkdown.push(md);
                }
                contributionsContent = contributionsMarkdown.join('\n<br/>\n\n');
              }
            } catch (err) {
              console.log(`Failed to fetch contributions: ${err.message}`);
            }

            let readme = fs.readFileSync('README.md', 'utf8');
            readme = readme.replace(
              /<!--START_SECTION:activity-->[\s\S]*<!--END_SECTION:activity-->/,
              `<!--START_SECTION:activity-->\n${activity.join('\n')}\n<!--END_SECTION:activity-->`
            );
            readme = readme.replace(
              /<!--START_SECTION:contributions-->[\s\S]*<!--END_SECTION:contributions-->/,
              `<!--START_SECTION:contributions-->\n${contributionsContent}\n<!--END_SECTION:contributions-->`
            );
            fs.writeFileSync('README.md', readme);

      - name: Fetch and Update Achievements
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            // Fetch the profile HTML to parse current achievements reliably
            const headers = {
              'Accept': 'text/html,application/xhtml+xml',
              'User-Agent': 'Mozilla/5.0 (compatible; GitHub-Actions-Bot)'
            };

            let achievements = [];

            try {
              const response = await fetch('https://github.com/arthimalla44?tab=achievements', { headers });
              const html = await response.text();

              // Try multiple regex patterns for robustness across GitHub HTML changes
              const patterns = [
                /class="achievement-badge[^"]*"[^>]*src="([^"]*githubassets[^"]*)"[^>]*alt="([^"]*)"/g,
                /src="(https:\/\/github\.githubassets\.com\/[^"]+)"[^>]*class="achievement-badge[^"]*"[^>]*alt="([^"]*)"/g,
                /src="(https:\/\/github\.githubassets\.com\/(?:assets|images)\/modules\/profile\/achievements\/[^"]+\.png[^"]*)"[^>]*alt="([^"]*)"/g
              ];

              const seen = new Set();

              for (const pattern of patterns) {
                let match;
                const tempAchievements = [];
                while ((match = pattern.exec(html)) !== null) {
                  const src = match[1];
                  const alt = match[2] || 'Achievement';
                  if (!seen.has(src)) {
                    seen.add(src);
                    tempAchievements.push(`    <img src="${src}" width="100" alt="${alt}" />`);
                  }
                }
                if (tempAchievements.length > 0) {
                  achievements = tempAchievements;
                  console.log(`Found ${achievements.length} achievements using pattern.`);
                  break;
                }
              }

              if (achievements.length === 0) {
                console.log('Could not parse achievements from HTML. Keeping existing values.');
                return;
              }
            } catch (err) {
              console.log(`Error fetching achievements: ${err.message}`);
              return;
            }

            const readme = fs.readFileSync('README.md', 'utf8');
            const newReadme = readme.replace(
              /<!--START_SECTION:achievements-->[\s\S]*<!--END_SECTION:achievements-->/,
              `<!--START_SECTION:achievements-->\n${achievements.join('\n')}\n<!--END_SECTION:achievements-->`
            );

            if (readme !== newReadme) {
              fs.writeFileSync('README.md', newReadme);
              console.log('Updated achievements successfully!');
            } else {
              console.log('No new achievements to update.');
            }

      - name: Commit and Push
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "docs: auto-update profile stats"
          git pull --rebase --autostash origin main
          git push origin main
